<!DOCTYPE html>
<html>
<head>
<title>Date Object Demo</title>
<script>
function dateDemo() {
var today = new Date();
var output = "";
output += "Current Date and Time: " + today + "<br><br>";
output += "Date: " + today.getDate() + "<br>";
output += "Month: " + (today.getMonth() + 1) + "<br>";
output += "Year: " + today.getFullYear() + "<br>";
output += "Day (0-Sun): " + today.getDay() + "<br><br>";
output += "Hours: " + today.getHours() + "<br>";
output += "Minutes: " + today.getMinutes() + "<br>";
output += "Seconds: " + today.getSeconds() + "<br><br>";

output += "Readable Date: " + today.toDateString();
document.getElementById("result").innerHTML = output;
}
</script>
</head>
<body onload="dateDemo()">
<h2>Date Object Properties and Methods</h2>
<p id="result"></p>
</body>
</html>
