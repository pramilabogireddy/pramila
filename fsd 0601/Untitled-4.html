<!DOCTYPE html>
<html>
<head>
<title>Math Object Demo</title>
<script>
function mathDemo() {
var num = 5.6;
var output = "";
// Math properties
output += "Math.PI = " + Math.PI + "<br>";
output += "Math.E = " + Math.E + "<br><br>";
// Math methods
output += "Square Root of 25 = " + Math.sqrt(25) + "<br>";
output += "Power (2^3) = " + Math.pow(2, 3) + "<br>";
output += "Round(5.6) = " + Math.round(num) + "<br>";
output += "Floor(5.6) = " + Math.floor(num) + "<br>";
output += "Ceil(5.6) = " + Math.ceil(num) + "<br>";
output += "Random Number = " + Math.random() + "<br>";

document.getElementById("result").innerHTML = output;
}
</script>
</head>
<body onload="mathDemo()">
<h2>Math Object Properties and Methods</h2>
<p id="result"></p>
</body>
</html>
