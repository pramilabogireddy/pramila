<!DOCTYPE html>
<html>
<head>
<title>Document Object Demo</title>
<script>
function showDocumentInfo() {
// Document properties
document.getElementById("title").innerHTML =
"Document Title: " + document.title;
document.getElementById("url").innerHTML =
"Document URL: " + document.URL;
// Document method - getElementsByTagName
var pCount = document.getElementsByTagName("p").length;
document.getElementById("count").innerHTML =
"Number of <p> tags: " + pCount;
}

function writeMessage() {
document.write("This text is written using document.write()");
}
</script>
</head>
<body onload="showDocumentInfo()">
<h2>Document Object Properties and Methods</h2>
<p id="title"></p>
<p id="url"></p>
<p id="count"></p>
<p>This is paragraph one.</p>
<p>This is paragraph two.</p>
<button onclick="writeMessage()">Use document.write()</button>
</body>
</html><!DOCTYPE html>
<html>
<head>
<title>Window Object Demo</title>
<script>
function showWindowProperties() {
document.getElementById("size").innerHTML =
"Window Width: " + window.innerWidth +
" px, Height: " + window.innerHeight + " px";
document.getElementById("url").innerHTML =
"Current URL: " + window.location.href;
}
function showAlert() {
window.alert("This is an alert using window object");
}

function showConfirm() {
var result = window.confirm("Do you like JavaScript?");
document.getElementById("confirm").innerHTML =
"Confirm Result: " + result;
}
function showPrompt() {
var name = window.prompt("Enter your name:");
document.getElementById("prompt").innerHTML =
"Name Entered: " + name;
}
function openWindow() {
window.open("https://www.example.com", "_blank");
}
</script>
</head>
<body onload="showWindowProperties()">
<h2>Window Object Properties and Methods</h2>
<p id="size"></p>
<p id="url"></p>
<button onclick="showAlert()">Alert</button>
<button onclick="showConfirm()">Confirm</button>
<button onclick="showPrompt()">Prompt</button>
<button onclick="openWindow()">Open New Window</button>
<p id="confirm"></p>
<p id="prompt"></p>
</body>
</html>
