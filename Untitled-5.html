<!DOCTYPE html>
<html>
<head>
<title>String Object Demo</title>
<script>
function stringDemo() {
// Create a string
var str = "JavaScript Programming";
var output = "";
// String property
output += "Original String: " + str + "<br>";
output += "String Length: " + str.length + "<br><br>";
// String methods
output += "Uppercase: " + str.toUpperCase() + "<br>";
output += "Lowercase: " + str.toLowerCase() + "<br>";
output += "Character at position 4: " + str.charAt(4) + "<br>";
output += "Index of 'Script': " + str.indexOf("Script") + "<br>";
output += "Substring (0 to 10): " + str.substring(0, 10) + "<br>";
output += "Replace 'Programming' with 'Language': " +
str.replace("Programming", "Language") + "<br>";

document.getElementById("result").innerHTML = output;
}
</script>
</head>
<body onload="stringDemo()">
<h2>String Object Properties and Methods</h2>
<p id="result"></p>
</body>
</html>
