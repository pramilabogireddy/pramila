<!DOCTYPE html>
<html>
<head>
<title>Week Days Using Switch Case</title>
<script>
function showDay() {
var day = parseInt(prompt("Enter a number (1 to 7):"));
switch (day) {
case 1:
alert("Monday");
break;

case 2:
alert("Tuesday");
break;
case 3:
alert("Wednesday");
break;
case 4:
alert("Thursday");
break;
case 5:
alert("Friday");
break;
case 6:
alert("Saturday");
break;
case 7:
alert("Sunday");
break;
default:
alert("Invalid day number");
}
}
</script>
</head>
<body onload="showDay()">
<h2>Display Week Days Using Switch Case</h2>
</body>
</html>
