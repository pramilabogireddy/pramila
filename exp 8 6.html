<!DOCTYPE html>
<html>
<head>
<title>Currency Denomination</title>
<script>
function denomination() {
var amount = parseInt(prompt("Enter deposited amount:"));
var temp = amount;
var output = "";
var denominations = [100, 50, 20, 10, 5, 2, 1];
for (var i = 0; i < denominations.length; i++) {
var count = Math.floor(temp / denominations[i]);
if (count > 0) {
output += count + " - " + denominations[i] + "'s<br>";
temp = temp % denominations[i];
}
}
document.getElementById("result").innerHTML =
"<b>Deposited Amount:</b> Rs. " + amount + "<br><br>" +
"<b>Denomination Details:</b><br>" + output;
}
</script>
</head>
<body onload="denomination()">
<h2>Bank Amount Denomination</h2>
<p id="result"></p>
</body>
</html>
